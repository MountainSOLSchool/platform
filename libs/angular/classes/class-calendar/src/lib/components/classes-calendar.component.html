<sol-calendar
    [events]="classEvents$ | async"
    (eventClick)="classSelected$.next($event)"
></sol-calendar>

@for (selectedClass of selectedClasses$ | async; track selectedClass) {
    <mat-card [style]="{ width: '25rem', 'margin-bottom': '2em' }">
        <mat-card-header>
            <mat-card-title>{{ selectedClass.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p>Hey I'm the details.</p>
        </mat-card-content>
    </mat-card>
}
