<div
    [ngStyle]="{
        border: selected()
            ? '.2rem solid var(--sol-primary, #006633)'
            : '.2rem solid transparent',
        'border-radius': '6px',
        'box-sizing': 'border-box',
        height: 'fit-content',
    }"
>
    <mat-card
        style="
            width: 16rem;
            height: 20rem;
            margin: auto;
            display: flex;
            flex-direction: column;
        "
    >
        <mat-card-header>
            <mat-card-title>{{
                !!student() ? student()?.name : loading() ? '' : 'New Student'
            }}</mat-card-title>
            @if (student()?.birthday) {
                <mat-card-subtitle>
                    <h3 style="margin: 0">Birthday</h3>
                    <p style="margin: 0">{{ student()?.birthday }}</p>
                </mat-card-subtitle>
            }
        </mat-card-header>
        <mat-card-content style="flex: 1">
            @if (!!loading()) {
                <div style="display: flex; align-items: center; gap: 10px">
                    <mat-progress-spinner
                        mode="indeterminate"
                        diameter="20"
                    ></mat-progress-spinner>
                    <p>Loading previously enrolled students...</p>
                </div>
            } @else if (icon()) {
                <div class="w-full flex justify-content-center">
                    <div>
                        <mat-icon
                            style="font-size: 6rem; width: 6rem; height: 6rem"
                            >{{ matIconName() }}</mat-icon
                        >
                    </div>
                </div>
            }
        </mat-card-content>
        @if (!loading()) {
            <mat-card-actions>
                @if (selected()) {
                    <button
                        mat-raised-button
                        color="primary"
                        class="w-full mt-3"
                        [disabled]="disabled()"
                        (click)="clicked.emit()"
                    >
                        Selected
                    </button>
                } @else {
                    <button
                        mat-stroked-button
                        class="w-full mt-3"
                        [disabled]="disabled()"
                        (click)="clicked.emit()"
                    >
                        Select
                    </button>
                }
            </mat-card-actions>
        }
    </mat-card>
</div>
