<div class="summary-table-wrapper">
    @if (isLoading()) {
        <div class="loading">
            <mat-progress-spinner mode="indeterminate" diameter="32" />
        </div>
    } @else {
        <table
            mat-table
            [dataSource]="classCostSummaryRows() ?? []"
            class="summary-table"
        >
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td
                    mat-cell
                    *matCellDef="let row"
                    [ngClass]="{
                        'level-0': row.level === 0,
                        'level-1': row.level === 1,
                        'level-2': row.level === 2,
                    }"
                >
                    {{ row.name }}
                </td>
            </ng-container>
            <ng-container matColumnDef="semester">
                <th mat-header-cell *matHeaderCellDef>Semester</th>
                <td mat-cell *matCellDef="let row">{{ row.semester }}</td>
            </ng-container>
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef>Date</th>
                <td mat-cell *matCellDef="let row">{{ row.date }}</td>
            </ng-container>
            <ng-container matColumnDef="cost">
                <th mat-header-cell *matHeaderCellDef>Cost</th>
                <td mat-cell *matCellDef="let row">
                    {{
                        row.cost === ''
                            ? ''
                            : (row.isOption ? '+' : '') + (row.cost | currency)
                    }}
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr
                mat-row
                *matRowDef="let row; columns: displayedColumns"
                [ngClass]="{
                    'semester-row': row.level === 0,
                    'option-row': row.isOption,
                }"
            ></tr>
        </table>
    }
</div>
