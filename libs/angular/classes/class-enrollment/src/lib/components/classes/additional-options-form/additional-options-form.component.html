<div
    style="
        margin-top: 1rem;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    "
>
    @for (option of options(); track option) {
        <mat-checkbox
            (change)="optionSelected(option.id, $event.checked)"
            [name]="option.description"
        >
            {{ getLabel(option) }}
        </mat-checkbox>
    }
</div>
