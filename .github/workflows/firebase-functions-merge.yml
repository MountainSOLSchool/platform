name: Deploy on merge

# Promotion pipeline (built up across epic #230):
#
#   merge to main
#     ├── prepare_and_build       (compute affected functions, build artifact)
#     ├── deploy_functions_dev    (affected functions -> mountain-sol-platform-dev, WIF)
#     ├── deploy_hosting_dev       (enrollment-portal `dev` build -> dev Hosting, WIF)
#     └── e2e_dev                  (core enrollment Playwright vs the deployed dev stack)
#
# As of #232/#233 this workflow deploys to DEV ONLY. Dev deploys via keyless
# Workload Identity Federation (a short-lived access token minted by
# google-github-actions/auth, passed to `firebase deploy --token`; see #231).
# Prod deploys (functions + hosting) were intentionally removed here and return,
# behind the manual approval gate, in #236 — with the deployed-dev E2E gate
# (#234) and the approval gate (#235) slotting in between. Until then nothing is
# auto-deployed to prod on merge. (The old firebase-hosting-merge.yml, which
# deployed the portal straight to prod, was deleted in #233.)
#
# workflow_dispatch deploys to dev for trial verification: deploy_all also
# deploys ALL functions (ignoring the affected check), and the hosting job
# always runs.

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            deploy_all:
                description: 'Deploy ALL functions to dev (ignore the affected check).'
                required: false
                default: false
                type: boolean

env:
    NX_DAEMON: 'false'

# Serialize merge-pipeline runs. Two back-to-back merges otherwise race on the
# shared dev project (B's deploy lands mid-pipeline for A). cancel-in-progress
# stays false so an in-flight deploy is never aborted halfway.
concurrency:
    group: deploy-on-merge
    cancel-in-progress: false

jobs:
    prepare_and_build:
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        outputs:
            matrix: ${{ steps.get_affected.outputs.matrix }}
            has_changes: ${{ steps.get_affected.outputs.has_changes }}
            expected_functions: ${{ steps.get_affected.outputs.expected_functions }}
            cache_key: ${{ steps.set_cache_key.outputs.key }}
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 2

            - name: Get base commit
              id: base
              run: echo "commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'
                cache: 'npm'

            - name: Generate cache key
              id: set_cache_key
              run: echo "key=${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

            - name: Install dependencies
              run: npm ci

            - name: Get affected functions
              id: get_affected
              run: |
                  DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"

                  # Manual deploy_all (dev-only trial): deploy every enrollment
                  # function. Otherwise deploy only what's affected since HEAD~1.
                  if [ "$DEPLOY_ALL" == "true" ]; then
                    echo "Manual deploy_all requested — deploying all functions"
                    AFFECTED=$(npx nx show projects | grep 'firebase-enrollment-functions-' || true)
                  else
                    AFFECTED=$(npx nx show projects --affected --base=${{ steps.base.outputs.commit }} | grep 'firebase-enrollment-functions-' || true)
                  fi

                  # Only functions actually wired into the deploy entry point
                  # are deployable. A function library can exist without being
                  # exported from apps/functions/src/functions/index.ts (e.g. the
                  # orphaned current-semester lib) — `firebase deploy --only
                  # functions:<name>` fails with "No function matches the filter"
                  # for those. Build the set of exported names and skip the rest.
                  EXPORTED=$(grep -oE "export \{ [a-zA-Z0-9_]+ \}" apps/functions/src/functions/index.ts | sed -E 's/export \{ ([a-zA-Z0-9_]+) \}/\1/')

                  FUNCTIONS=()
                  while IFS= read -r lib; do
                    FUNC_NAME=${lib#firebase-enrollment-functions-}
                    if [ "$FUNC_NAME" != "shared" ]; then
                      FUNC_NAME=$(echo "$FUNC_NAME" | awk -F'-' '{for(i=1;i<=NF;i++){if(i==1){printf("%s",$i)}else{printf("%s%s",toupper(substr($i,1,1)),substr($i,2))}}}')
                      if echo "$EXPORTED" | grep -qx "$FUNC_NAME"; then
                        FUNCTIONS+=("$FUNC_NAME")
                      else
                        echo "Skipping $lib -> $FUNC_NAME (not exported in functions/index.ts)"
                      fi
                    fi
                  done <<< "$AFFECTED"

                  if [ ${#FUNCTIONS[@]} -eq 0 ]; then
                    echo "No functions were affected"
                    echo "has_changes=false" >> $GITHUB_OUTPUT
                    echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  echo "has_changes=true" >> $GITHUB_OUTPUT

                  # Flat list of every function this run intends to deploy. The
                  # verify_functions_dev job asserts each is ACTIVE afterward, so
                  # a partial deploy (firebase-tools exits 0 on per-function 409s)
                  # fails the run loudly instead of going green.
                  echo "expected_functions=${FUNCTIONS[*]}" >> $GITHUB_OUTPUT

                  # Batch the deploy into groups of GROUP_SIZE functions, one
                  # `firebase deploy` per group, run sequentially (max-parallel:
                  # 1). The size is a balance:
                  #
                  #  - Too LARGE: a cold deploy that *creates* many functions at
                  #    once (e.g. backfilling a fresh project, or a deploy_all)
                  #    fires all the create operations near-simultaneously and
                  #    overruns Cloud Functions' concurrent-operation throttle —
                  #    the API rejects the surplus with HTTP 409 "unable to queue
                  #    the operation" / "already exists". firebase-tools logs
                  #    those as warnings and STILL EXITS 0, so the job goes green
                  #    while most functions never deploy. (Observed June 2026: a
                  #    single 77-function deploy_all landed only 1 of 46 creates.)
                  #  - Too SMALL: every separate deploy re-uploads the ~4 MB
                  #    source, re-runs the "ensuring API X enabled" checks, and
                  #    re-does discovery, so many tiny batches waste wall time.
                  #
                  # 15 keeps each batch's concurrent operations under the throttle
                  # while leaving the common case — a normal merge touches only a
                  # handful of affected functions — as a single batch (no speed
                  # regression). Only large/cold deploys split. We can't
                  # parallelize the batches: this is a single Firebase codebase
                  # and concurrent deploys to one codebase race on Firebase's
                  # "deployment in progress" lock (hence max-parallel: 1). True
                  # parallel deploys would need multiple codebases, maple-style.
                  GROUP_SIZE=15
                  TOTAL=${#FUNCTIONS[@]}
                  NUM_GROUPS=$(( (TOTAL + GROUP_SIZE - 1) / GROUP_SIZE ))

                  VALID_GROUPS=()

                  for ((i=0; i<$NUM_GROUPS; i++)); do
                    START=$((i * GROUP_SIZE))
                    GROUP_FUNCTIONS=""

                    for ((j=0; j<GROUP_SIZE && START+j<TOTAL; j++)); do
                      if [ ! -z "$GROUP_FUNCTIONS" ]; then
                        GROUP_FUNCTIONS+=","
                      fi
                      GROUP_FUNCTIONS+="functions:${FUNCTIONS[START+j]}"
                    done

                    # Only add non-empty groups
                    if [ ! -z "$GROUP_FUNCTIONS" ] && [ "$GROUP_FUNCTIONS" != "functions:" ]; then
                      VALID_GROUPS+=("{\"functions\":\"$GROUP_FUNCTIONS\"}")
                    fi
                  done

                  # Combine valid groups into JSON array with include
                  GROUPS_JSON="{\"include\":["
                  for ((i=0; i<${#VALID_GROUPS[@]}; i++)); do
                    if [ $i -gt 0 ]; then
                      GROUPS_JSON+=","
                    fi
                    GROUPS_JSON+="${VALID_GROUPS[i]}"
                  done
                  GROUPS_JSON+="]}"

                  echo "matrix=$GROUPS_JSON" >> $GITHUB_OUTPUT

                  echo "Total affected functions: $TOTAL"
                  echo "Number of groups: $NUM_GROUPS"
                  echo "Matrix: $GROUPS_JSON"

            - name: Build all functions
              if: steps.get_affected.outputs.has_changes == 'true'
              run: npx nx run functions:build

            - name: Regenerate functions package-lock.json
              if: steps.get_affected.outputs.has_changes == 'true'
              working-directory: dist/apps/functions
              run: npm install --package-lock-only

            - name: Cache node_modules for deploy
              if: steps.get_affected.outputs.has_changes == 'true'
              uses: actions/cache/save@v4
              with:
                path: node_modules
                key: ${{ steps.set_cache_key.outputs.key }}

            - name: Upload build artifacts
              if: steps.get_affected.outputs.has_changes == 'true'
              uses: actions/upload-artifact@v4
              with:
                name: dist-functions
                path: |
                  dist/apps/functions/main.js
                  dist/apps/functions/main.js.map
                  dist/apps/functions/package.json
                  dist/apps/functions/package-lock.json
                retention-days: 1

    deploy_functions_dev:
        needs: prepare_and_build
        if: >-
          needs.prepare_and_build.outputs.has_changes == 'true' &&
          needs.prepare_and_build.outputs.matrix != '' &&
          toJson(fromJson(needs.prepare_and_build.outputs.matrix).include) != '[]'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        strategy:
            max-parallel: 1
            matrix: ${{ fromJson(needs.prepare_and_build.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 1

            # Keyless WIF auth. token_format: access_token mints a short-lived
            # OAuth token; firebase deploy gets it via --token below. Pure ADC
            # (the external_account credential file) doesn't work for the deploy
            # path and `gcloud auth print-access-token` is rejected by
            # firebase-tools 15 — see #231 / maple #490.
            - name: Authenticate to Google Cloud (Dev)
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true
                  token_format: 'access_token'

            - name: Setup gcloud CLI
              uses: google-github-actions/setup-gcloud@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                name: dist-functions

            - name: Install dependencies
              run: npm ci

            - name: Deploy functions group to Dev
              if: matrix.functions != ''
              # firebase-tools is pinned to 15.22.x (the version that fixed
              # keyless-token functions deploys — maple #497) and run via npx so
              # we don't disturb the repo's 14.x used by the emulator suites.
              # Retry absorbs transient GCS 5xx on the source upload.
              run: |
                set -o pipefail
                for attempt in 1 2 3; do
                  if npx -y firebase-tools@15.22.2 deploy \
                    --only ${{ matrix.functions }} \
                    --project dev \
                    --force \
                    --token "${{ steps.auth.outputs.access_token }}"; then
                    exit 0
                  fi
                  if [ $attempt -lt 3 ]; then
                    echo "::warning::firebase deploy to dev attempt $attempt failed; retrying in 30s"
                    sleep 30
                  fi
                done
                echo "::error::firebase deploy to dev failed after 3 attempts"
                exit 1

            - name: Skip empty function group
              if: matrix.functions == ''
              run: echo "Skipping deployment for empty function group"

    verify_functions_dev:
        # firebase-tools logs per-function create/update 409s (e.g. the
        # concurrent-operation throttle on a cold deploy) as warnings and STILL
        # EXITS 0, so a partial deploy goes green. Reconcile the intended set
        # against the Cloud Functions API and fail loudly on any function that
        # is missing or not ACTIVE — turning a silent partial deploy into a red
        # run. always() so it reports the true state even if a deploy batch
        # itself failed.
        needs: [prepare_and_build, deploy_functions_dev]
        if: >-
          always() &&
          needs.prepare_and_build.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Authenticate to Google Cloud (Dev)
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true
                  token_format: 'access_token'

            - name: Setup gcloud CLI
              uses: google-github-actions/setup-gcloud@v2

            - name: Assert every intended function is ACTIVE
              run: |
                set -o pipefail
                EXPECTED="${{ needs.prepare_and_build.outputs.expected_functions }}"
                TOKEN="${{ steps.auth.outputs.access_token }}"

                ACTIVE=$(curl -s -H "Authorization: Bearer $TOKEN" \
                  "https://cloudfunctions.googleapis.com/v2/projects/mountain-sol-platform-dev/locations/-/functions?pageSize=300" \
                  | python3 -c "import sys,json;[print(f['name'].split('/')[-1]) for f in json.load(sys.stdin).get('functions',[]) if f.get('state')=='ACTIVE']" \
                  | sort -u)

                MISSING=""
                for fn in $EXPECTED; do
                  echo "$ACTIVE" | grep -qx "$fn" || MISSING="$MISSING $fn"
                done

                if [ -n "$MISSING" ]; then
                  echo "::error::Deploy verification FAILED — these intended functions are not ACTIVE in mountain-sol-platform-dev:$MISSING"
                  echo "firebase-tools exits 0 on per-function 409s, so the deploy job may be green despite this. Re-run the deploy (a cold backfill may need several passes; see GROUP_SIZE notes above)."
                  exit 1
                fi
                echo "✓ All $(echo $EXPECTED | wc -w) intended functions are ACTIVE."

    deploy_hosting_dev:
        # Build the enrollment-portal `dev` configuration (which targets the dev
        # Firebase project — see #231) and deploy it to the dev Hosting site via
        # the `portal` target. Independent of the functions matrix: runs on every
        # merge so the deployed-dev portal stays current for the #234 E2E gate.
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Authenticate to Google Cloud (Dev)
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true
                  token_format: 'access_token'

            - name: Setup gcloud CLI
              uses: google-github-actions/setup-gcloud@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build enrollment-portal (dev)
              run: npx nx run enrollment-portal:build:dev --outputPath="public"

            - name: Deploy portal to dev Hosting
              # firebase-tools pinned to match the functions job (keyless-token
              # deploys); retry absorbs transient upload 5xx.
              #
              # Idempotency: when the built portal is byte-identical to what's
              # already live (every merge that doesn't change the portal bundle),
              # the upload + version-finalize succeed but the release call returns
              # HTTP 400 "is the current active version" and firebase deploy exits
              # non-zero. The content IS live in that case, so treat that specific
              # error as success rather than failing the job (maple #501).
              run: |
                set -o pipefail
                OUT=$(mktemp)
                trap 'rm -f "$OUT"' EXIT
                for attempt in 1 2 3; do
                  if npx -y firebase-tools@15.22.2 deploy \
                    --only hosting:portal \
                    --project dev \
                    --force \
                    --token "${{ steps.auth.outputs.access_token }}" 2>&1 | tee "$OUT"; then
                    exit 0
                  fi
                  if grep -q "is the current active version" "$OUT"; then
                    echo "::notice::Portal already at the live version — treating as success."
                    exit 0
                  fi
                  if [ $attempt -lt 3 ]; then
                    echo "::warning::dev hosting deploy attempt $attempt failed; retrying in 30s"
                    sleep 30
                  fi
                done
                echo "::error::dev hosting deploy failed after 3 attempts"
                exit 1

    e2e_dev:
        # The gate: run the core enrollment E2E against the deployed dev stack
        # (portal on dev Hosting + callables on the dev project). Seeds dev
        # Firestore/Auth via the Admin SDK over ADC. Runs once both dev deploys
        # are healthy; deploy_functions_dev is skipped on no-op merges, so treat
        # skipped as ok. always() is needed because a skipped need would
        # otherwise skip this job too.
        needs: [deploy_functions_dev, deploy_hosting_dev]
        if: >-
          always() &&
          (needs.deploy_functions_dev.result == 'success' || needs.deploy_functions_dev.result == 'skipped') &&
          needs.deploy_hosting_dev.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 1

            # create_credentials_file exports GOOGLE_APPLICATION_CREDENTIALS so
            # the Admin SDK seed/teardown reaches dev Firestore/Auth via ADC.
            - name: Authenticate to Google Cloud (Dev)
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                # Pinned 22.22.3: Node 22.23.0 regressed node-fetch keep-alive
                # (false "Premature close" on concurrent requests) — maple #503.
                node-version: '22.22.3'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Run deployed-dev E2E
              env:
                  E2E_TARGET: dev
                  GOOGLE_CLOUD_PROJECT: mountain-sol-platform-dev
              run: npx nx run enrollment-portal-e2e:e2e

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-dev
                  path: |
                      apps/enrollment-portal-e2e/playwright-report/**
                      apps/enrollment-portal-e2e/test-results/**
                  retention-days: 7
