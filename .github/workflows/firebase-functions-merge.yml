name: Deploy on merge

# Promotion pipeline (built up across epic #230):
#
#   merge to main
#     ├── prepare_and_build       (compute affected functions, build artifact)
#     ├── deploy_functions_dev    (affected functions -> mountain-sol-platform-dev, WIF)
#     └── deploy_hosting_dev       (enrollment-portal `dev` build -> dev Hosting, WIF)
#
# As of #232/#233 this workflow deploys to DEV ONLY. Dev deploys via keyless
# Workload Identity Federation (a short-lived access token minted by
# google-github-actions/auth, passed to `firebase deploy --token`; see #231).
# Prod deploys (functions + hosting) were intentionally removed here and return,
# behind the manual approval gate, in #236 — with the deployed-dev E2E gate
# (#234) and the approval gate (#235) slotting in between. Until then nothing is
# auto-deployed to prod on merge. (The old firebase-hosting-merge.yml, which
# deployed the portal straight to prod, was deleted in #233.)
#
# workflow_dispatch deploys to dev for trial verification: deploy_all also
# deploys ALL functions (ignoring the affected check), and the hosting job
# always runs.

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            deploy_all:
                description: 'Deploy ALL functions to dev (ignore the affected check).'
                required: false
                default: false
                type: boolean

env:
    NX_DAEMON: 'false'

# Serialize merge-pipeline runs. Two back-to-back merges otherwise race on the
# shared dev project (B's deploy lands mid-pipeline for A). cancel-in-progress
# stays false so an in-flight deploy is never aborted halfway.
concurrency:
    group: deploy-on-merge
    cancel-in-progress: false

jobs:
    prepare_and_build:
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        outputs:
            matrix: ${{ steps.get_affected.outputs.matrix }}
            has_changes: ${{ steps.get_affected.outputs.has_changes }}
            cache_key: ${{ steps.set_cache_key.outputs.key }}
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 2

            - name: Get base commit
              id: base
              run: echo "commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22'
                cache: 'npm'

            - name: Generate cache key
              id: set_cache_key
              run: echo "key=${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

            - name: Install dependencies
              run: npm ci

            - name: Get affected functions
              id: get_affected
              run: |
                  DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"

                  # Manual deploy_all (dev-only trial): deploy every enrollment
                  # function. Otherwise deploy only what's affected since HEAD~1.
                  if [ "$DEPLOY_ALL" == "true" ]; then
                    echo "Manual deploy_all requested — deploying all functions"
                    AFFECTED=$(npx nx show projects | grep 'firebase-enrollment-functions-' || true)
                  else
                    AFFECTED=$(npx nx show projects --affected --base=${{ steps.base.outputs.commit }} | grep 'firebase-enrollment-functions-' || true)
                  fi

                  FUNCTIONS=()
                  while IFS= read -r lib; do
                    FUNC_NAME=${lib#firebase-enrollment-functions-}
                    if [ "$FUNC_NAME" != "shared" ]; then
                      FUNC_NAME=$(echo "$FUNC_NAME" | awk -F'-' '{for(i=1;i<=NF;i++){if(i==1){printf("%s",$i)}else{printf("%s%s",toupper(substr($i,1,1)),substr($i,2))}}}')
                      FUNCTIONS+=("$FUNC_NAME")
                    fi
                  done <<< "$AFFECTED"

                  if [ ${#FUNCTIONS[@]} -eq 0 ]; then
                    echo "No functions were affected"
                    echo "has_changes=false" >> $GITHUB_OUTPUT
                    echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  echo "has_changes=true" >> $GITHUB_OUTPUT

                  GROUP_SIZE=5
                  TOTAL=${#FUNCTIONS[@]}
                  NUM_GROUPS=$(( (TOTAL + GROUP_SIZE - 1) / GROUP_SIZE ))

                  VALID_GROUPS=()

                  for ((i=0; i<$NUM_GROUPS; i++)); do
                    START=$((i * GROUP_SIZE))
                    GROUP_FUNCTIONS=""

                    for ((j=0; j<GROUP_SIZE && START+j<TOTAL; j++)); do
                      if [ ! -z "$GROUP_FUNCTIONS" ]; then
                        GROUP_FUNCTIONS+=","
                      fi
                      GROUP_FUNCTIONS+="functions:${FUNCTIONS[START+j]}"
                    done

                    # Only add non-empty groups
                    if [ ! -z "$GROUP_FUNCTIONS" ] && [ "$GROUP_FUNCTIONS" != "functions:" ]; then
                      VALID_GROUPS+=("{\"functions\":\"$GROUP_FUNCTIONS\"}")
                    fi
                  done

                  # Combine valid groups into JSON array with include
                  GROUPS_JSON="{\"include\":["
                  for ((i=0; i<${#VALID_GROUPS[@]}; i++)); do
                    if [ $i -gt 0 ]; then
                      GROUPS_JSON+=","
                    fi
                    GROUPS_JSON+="${VALID_GROUPS[i]}"
                  done
                  GROUPS_JSON+="]}"

                  echo "matrix=$GROUPS_JSON" >> $GITHUB_OUTPUT

                  echo "Total affected functions: $TOTAL"
                  echo "Number of groups: $NUM_GROUPS"
                  echo "Matrix: $GROUPS_JSON"

            - name: Build all functions
              if: steps.get_affected.outputs.has_changes == 'true'
              run: npx nx run functions:build

            - name: Regenerate functions package-lock.json
              if: steps.get_affected.outputs.has_changes == 'true'
              working-directory: dist/apps/functions
              run: npm install --package-lock-only

            - name: Cache node_modules for deploy
              if: steps.get_affected.outputs.has_changes == 'true'
              uses: actions/cache/save@v4
              with:
                path: node_modules
                key: ${{ steps.set_cache_key.outputs.key }}

            - name: Upload build artifacts
              if: steps.get_affected.outputs.has_changes == 'true'
              uses: actions/upload-artifact@v4
              with:
                name: dist-functions
                path: |
                  dist/apps/functions/main.js
                  dist/apps/functions/main.js.map
                  dist/apps/functions/package.json
                  dist/apps/functions/package-lock.json
                retention-days: 1

    deploy_functions_dev:
        needs: prepare_and_build
        if: >-
          needs.prepare_and_build.outputs.has_changes == 'true' &&
          needs.prepare_and_build.outputs.matrix != '' &&
          toJson(fromJson(needs.prepare_and_build.outputs.matrix).include) != '[]'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        strategy:
            max-parallel: 1
            matrix: ${{ fromJson(needs.prepare_and_build.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 1

            # Keyless WIF auth. token_format: access_token mints a short-lived
            # OAuth token; firebase deploy gets it via --token below. Pure ADC
            # (the external_account credential file) doesn't work for the deploy
            # path and `gcloud auth print-access-token` is rejected by
            # firebase-tools 15 — see #231 / maple #490.
            - name: Authenticate to Google Cloud (Dev)
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true
                  token_format: 'access_token'

            - name: Setup gcloud CLI
              uses: google-github-actions/setup-gcloud@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22'

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                name: dist-functions

            - name: Install dependencies
              run: npm ci

            - name: Deploy functions group to Dev
              if: matrix.functions != ''
              # firebase-tools is pinned to 15.22.x (the version that fixed
              # keyless-token functions deploys — maple #497) and run via npx so
              # we don't disturb the repo's 14.x used by the emulator suites.
              # Retry absorbs transient GCS 5xx on the source upload.
              run: |
                set -o pipefail
                for attempt in 1 2 3; do
                  if npx -y firebase-tools@15.22.2 deploy \
                    --only ${{ matrix.functions }} \
                    --project dev \
                    --force \
                    --token "${{ steps.auth.outputs.access_token }}"; then
                    exit 0
                  fi
                  if [ $attempt -lt 3 ]; then
                    echo "::warning::firebase deploy to dev attempt $attempt failed; retrying in 30s"
                    sleep 30
                  fi
                done
                echo "::error::firebase deploy to dev failed after 3 attempts"
                exit 1

            - name: Skip empty function group
              if: matrix.functions == ''
              run: echo "Skipping deployment for empty function group"

    deploy_hosting_dev:
        # Build the enrollment-portal `dev` configuration (which targets the dev
        # Firebase project — see #231) and deploy it to the dev Hosting site via
        # the `portal` target. Independent of the functions matrix: runs on every
        # merge so the deployed-dev portal stays current for the #234 E2E gate.
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Authenticate to Google Cloud (Dev)
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: 'projects/1062901014652/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                  service_account: 'github-deployer@mountain-sol-platform-dev.iam.gserviceaccount.com'
                  create_credentials_file: true
                  token_format: 'access_token'

            - name: Setup gcloud CLI
              uses: google-github-actions/setup-gcloud@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build enrollment-portal (dev)
              run: npx nx run enrollment-portal:build:dev --outputPath="public"

            - name: Deploy portal to dev Hosting
              # firebase-tools pinned to match the functions job (keyless-token
              # deploys); retry absorbs transient upload 5xx.
              #
              # Idempotency: when the built portal is byte-identical to what's
              # already live (every merge that doesn't change the portal bundle),
              # the upload + version-finalize succeed but the release call returns
              # HTTP 400 "is the current active version" and firebase deploy exits
              # non-zero. The content IS live in that case, so treat that specific
              # error as success rather than failing the job (maple #501).
              run: |
                set -o pipefail
                OUT=$(mktemp)
                trap 'rm -f "$OUT"' EXIT
                for attempt in 1 2 3; do
                  if npx -y firebase-tools@15.22.2 deploy \
                    --only hosting:portal \
                    --project dev \
                    --force \
                    --token "${{ steps.auth.outputs.access_token }}" 2>&1 | tee "$OUT"; then
                    exit 0
                  fi
                  if grep -q "is the current active version" "$OUT"; then
                    echo "::notice::Portal already at the live version — treating as success."
                    exit 0
                  fi
                  if [ $attempt -lt 3 ]; then
                    echo "::warning::dev hosting deploy attempt $attempt failed; retrying in 30s"
                    sleep 30
                  fi
                done
                echo "::error::dev hosting deploy failed after 3 attempts"
                exit 1
