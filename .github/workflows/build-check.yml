name: Check builds on PR

on:
    pull_request:
        branches:
            - '**'

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npx nx run enrollment-portal:build:production
            - run: npx nx run student-portal:build:production
            - run: npx nx run functions:build

    lint:
        name: Lint
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Derive affected SHAs
              uses: nrwl/nx-set-shas@v4
            - run: npm ci
            - name: Lint affected projects
              run: npx nx affected -t lint --parallel=4

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Derive affected SHAs
              uses: nrwl/nx-set-shas@v4
            - run: npm ci
            - name: Test affected projects
              run: npx nx affected -t test --exclude=functions-integration-tests --parallel=4

    storybook:
        name: Storybook Build & Tests
        runs-on: ubuntu-latest
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
            - name: Build Storybook
              run: npx nx run enrollment-portal:build-storybook
            - name: Serve Storybook and run interaction tests
              run: |
                  npx concurrently -k -s first -n "SB,TEST" \
                    "npx http-server dist/storybook/enrollment-portal --port 6006 --silent" \
                    "npx wait-on tcp:6006 && npx test-storybook --config-dir apps/enrollment-portal/.storybook --url http://localhost:6006 --ci"

    integration-tests:
        name: Firebase Integration Tests
        runs-on: ubuntu-latest
        # Fail fast if the emulators hang on startup instead of burning the
        # 6h job default (an unauthenticated emulators:exec given a literal
        # real project id stalls fetching prod config — see the `emulator`
        # alias below).
        timeout-minutes: 25
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: '21'
            - run: npm ci
            - name: Build functions
              run: npx nx run functions:build
            - name: Create secret overrides for emulator
              run: |
                  cat <<'EOF' > .secret.local
                  BRAINTREE_MERCHANT_ID=fake_merchant_id
                  BRAINTREE_PUBLIC_KEY=fake_public_key
                  BRAINTREE_PRIVATE_KEY=fake_private_key
                  BRAINTREE_MERCHANT_ID_PROD=fake_merchant_id_prod
                  BRAINTREE_PUBLIC_KEY_PROD=fake_public_key_prod
                  BRAINTREE_PRIVATE_KEY_PROD=fake_private_key_prod
                  BRAINTREE_VENMO_PROFILE_ID=fake_venmo_profile_id
                  BRAINTREE_VENMO_PROFILE_ID_PROD=fake_venmo_profile_id_prod
                  EOF
            # Use the `emulator` alias (-> mountain-sol-platform), NOT the
            # literal project id: firebase-tools treats a literal id as an
            # explicit prod project and, when unauthenticated (as CI is),
            # stalls fetching its Admin SDK config. An alias key keeps the
            # emulators offline. The alias resolves to the same id the seed
            # helpers + app config hardcode, so no singleProjectMode bridging.
            - name: Run integration tests with emulators
              run: npx firebase emulators:exec --project=emulator --only auth,firestore,functions "npx nx run functions-integration-tests:test"

    enrollment-e2e:
        name: Enrollment E2E
        runs-on: ubuntu-latest
        # Fail fast if the emulators hang on startup (see integration-tests).
        timeout-minutes: 25
        if: github.repository == 'MountainSOLSchool/platform'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: '21'
            - run: npm ci
            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium
            - name: Build functions
              run: npx nx run functions:build
            - name: Create secret overrides for emulator
              run: |
                  cat <<'EOF' > .secret.local
                  BRAINTREE_MERCHANT_ID=fake_merchant_id
                  BRAINTREE_PUBLIC_KEY=fake_public_key
                  BRAINTREE_PRIVATE_KEY=fake_private_key
                  BRAINTREE_MERCHANT_ID_PROD=fake_merchant_id_prod
                  BRAINTREE_PUBLIC_KEY_PROD=fake_public_key_prod
                  BRAINTREE_PRIVATE_KEY_PROD=fake_private_key_prod
                  BRAINTREE_VENMO_PROFILE_ID=fake_venmo_profile_id
                  BRAINTREE_VENMO_PROFILE_ID_PROD=fake_venmo_profile_id_prod
                  EOF
            # emulators:exec exports FIRESTORE_EMULATOR_HOST / FIREBASE_AUTH_EMULATOR_HOST
            # to the wrapped command, so global-setup seeds the right ports. The
            # e2e target's Playwright webServer serves the app in emulator mode.
            - name: Run enrollment E2E with emulators
              run: npx firebase emulators:exec --project=emulator --config firebase.e2e.json --only auth,firestore,functions "npx nx run enrollment-portal-e2e:e2e"
            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report-enrollment-e2e
                  path: |
                      apps/enrollment-portal-e2e/playwright-report/**
                      apps/enrollment-portal-e2e/test-results/**
                  retention-days: 7
